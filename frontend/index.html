<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CheatShield AI 🎮 — Anti-Cheat Detection Dashboard</title>
<meta name="description" content="CheatShield AI: Real-time ML-powered anti-cheat detection dashboard with ensemble models and behavioral analysis."/>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet"/>
<style>
  /* ═══════════════════════════════════════════════════════════════════════
     CHEATSHIELD AI — PREMIUM DESIGN SYSTEM v2.0
     Glassmorphism · Animated Grid · Cybersec Aesthetic
     ═══════════════════════════════════════════════════════════════════════ */

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  html { scroll-behavior: smooth; }

  /* ── Custom Scrollbar ─────────────────────────────────────────────── */
  ::-webkit-scrollbar { width: 8px; }
  ::-webkit-scrollbar-track { background: #08080f; }
  ::-webkit-scrollbar-thumb {
    background: linear-gradient(180deg, #7c3aed, #3b82f6);
    border-radius: 4px;
  }
  ::-webkit-scrollbar-thumb:hover { background: #a855f7; }

  /* ── Animated Dot Grid Background ─────────────────────────────────── */
  body {
    background: #08080f;
    color: #e0e0ff;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    min-height: 100vh;
    position: relative;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background-image:
      radial-gradient(circle, rgba(168, 85, 247, 0.12) 1px, transparent 1px);
    background-size: 32px 32px;
    animation: gridDrift 20s linear infinite;
    pointer-events: none;
    z-index: 0;
  }

  /* Scanline overlay */
  body::after {
    content: '';
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0, 0, 0, 0.03) 2px,
      rgba(0, 0, 0, 0.03) 4px
    );
    pointer-events: none;
    z-index: 1;
  }

  @keyframes gridDrift {
    0% { transform: translate(0, 0); }
    100% { transform: translate(32px, 32px); }
  }

  /* ── Header ───────────────────────────────────────────────────────── */
  header {
    position: relative;
    z-index: 10;
    background: linear-gradient(135deg, rgba(26, 5, 51, 0.9), rgba(13, 31, 74, 0.9));
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    padding: 24px 40px;
    display: flex;
    align-items: center;
    gap: 16px;
    border-bottom: 1px solid rgba(168, 85, 247, 0.2);
    box-shadow: 0 4px 30px rgba(0, 0, 0, 0.4), 0 1px 0 rgba(168, 85, 247, 0.15);
  }

  header h1 {
    font-family: 'Inter', sans-serif;
    font-size: 1.9rem;
    font-weight: 800;
    background: linear-gradient(135deg, #a855f7, #6366f1, #3b82f6);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: -0.5px;
  }

  header span {
    font-size: 0.82rem;
    color: rgba(255, 255, 255, 0.4);
    font-weight: 400;
    letter-spacing: 0.5px;
  }

  /* ── Glass Card System ────────────────────────────────────────────── */
  .card {
    position: relative;
    z-index: 5;
    background: rgba(17, 17, 34, 0.6);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid rgba(168, 85, 247, 0.1);
    border-radius: 16px;
    padding: 24px;
    transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    overflow: hidden;
  }

  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(168, 85, 247, 0.4), transparent);
  }

  .card:hover {
    border-color: rgba(168, 85, 247, 0.25);
    box-shadow:
      0 8px 32px rgba(168, 85, 247, 0.1),
      0 0 0 1px rgba(168, 85, 247, 0.05),
      inset 0 1px 0 rgba(255, 255, 255, 0.03);
    transform: translateY(-2px);
  }

  .card h2 {
    font-family: 'Inter', sans-serif;
    font-size: 0.78rem;
    font-weight: 600;
    color: rgba(168, 85, 247, 0.9);
    margin-bottom: 20px;
    text-transform: uppercase;
    letter-spacing: 2px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .card h2::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, rgba(168, 85, 247, 0.2), transparent);
  }

  /* ── Grid Layout ──────────────────────────────────────────────────── */
  .grid {
    position: relative;
    z-index: 5;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    padding: 24px;
    max-width: 1440px;
    margin: 0 auto;
  }

  /* ── Stat Cards ───────────────────────────────────────────────────── */
  .stats-row {
    position: relative;
    z-index: 5;
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
    padding: 0 24px;
    max-width: 1440px;
    margin: 24px auto 0;
  }

  .stat {
    position: relative;
    background: rgba(17, 17, 34, 0.6);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border: 1px solid rgba(168, 85, 247, 0.1);
    border-radius: 14px;
    padding: 20px;
    text-align: center;
    transition: all 0.3s ease;
    overflow: hidden;
  }

  .stat::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, #a855f7, #3b82f6);
    opacity: 0;
    transition: opacity 0.3s ease;
  }

  .stat:hover::before { opacity: 1; }

  .stat:hover {
    border-color: rgba(168, 85, 247, 0.2);
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
  }

  .stat .val {
    font-family: 'JetBrains Mono', monospace;
    font-size: 2.2rem;
    font-weight: 700;
    color: #a855f7;
    line-height: 1;
    animation: pulseGlow 3s ease-in-out infinite;
  }

  .stat .lbl {
    font-size: 0.72rem;
    color: rgba(255, 255, 255, 0.35);
    margin-top: 8px;
    text-transform: uppercase;
    letter-spacing: 1px;
    font-weight: 500;
  }

  @keyframes pulseGlow {
    0%, 100% { text-shadow: 0 0 0 transparent; }
    50% { text-shadow: 0 0 20px rgba(168, 85, 247, 0.3); }
  }

  /* ── Sliders ──────────────────────────────────────────────────────── */
  label {
    display: block;
    font-size: 0.75rem;
    color: rgba(255, 255, 255, 0.4);
    margin-bottom: 4px;
    margin-top: 12px;
    font-weight: 500;
    letter-spacing: 0.3px;
  }

  input[type=range] {
    width: 100%;
    -webkit-appearance: none;
    appearance: none;
    height: 4px;
    background: rgba(168, 85, 247, 0.15);
    border-radius: 4px;
    outline: none;
    transition: background 0.3s;
  }

  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 16px;
    height: 16px;
    border-radius: 50%;
    background: linear-gradient(135deg, #a855f7, #7c3aed);
    cursor: pointer;
    box-shadow: 0 0 10px rgba(168, 85, 247, 0.4);
    transition: transform 0.2s, box-shadow 0.2s;
  }

  input[type=range]::-webkit-slider-thumb:hover {
    transform: scale(1.3);
    box-shadow: 0 0 20px rgba(168, 85, 247, 0.6);
  }

  .val-display {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.85rem;
    color: #c084fc;
    font-weight: 600;
  }

  .sliders {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0 24px;
  }

  /* ── Predict Button ───────────────────────────────────────────────── */
  button#predictBtn {
    width: 100%;
    margin-top: 24px;
    padding: 16px;
    background: linear-gradient(135deg, #7c3aed, #4f46e5, #2563eb);
    border: none;
    border-radius: 12px;
    color: #fff;
    font-family: 'Inter', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    letter-spacing: 0.5px;
    position: relative;
    overflow: hidden;
  }

  button#predictBtn::before {
    content: '';
    position: absolute;
    top: 0; left: -100%;
    width: 100%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
    transition: left 0.5s;
  }

  button#predictBtn:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 25px rgba(124, 58, 237, 0.4);
  }

  button#predictBtn:hover::before {
    left: 100%;
  }

  button#predictBtn:active {
    transform: translateY(0);
  }

  /* ── Result Box ───────────────────────────────────────────────────── */
  .result-box {
    margin-top: 20px;
    padding: 20px;
    border-radius: 14px;
    text-align: center;
    font-family: 'JetBrains Mono', monospace;
    font-size: 1.4rem;
    font-weight: 700;
    display: none;
    animation: resultSlideIn 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    backdrop-filter: blur(10px);
  }

  @keyframes resultSlideIn {
    from { opacity: 0; transform: translateY(10px) scale(0.98); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }

  .result-box.cheat {
    background: rgba(239, 68, 68, 0.1);
    border: 1px solid rgba(239, 68, 68, 0.3);
    color: #f87171;
    box-shadow: 0 0 30px rgba(239, 68, 68, 0.1);
  }

  .result-box.legit {
    background: rgba(34, 197, 94, 0.1);
    border: 1px solid rgba(34, 197, 94, 0.3);
    color: #4ade80;
    box-shadow: 0 0 30px rgba(34, 197, 94, 0.1);
  }

  .result-meta {
    font-family: 'Inter', sans-serif;
    font-size: 0.82rem;
    font-weight: 400;
    margin-top: 8px;
    color: rgba(255, 255, 255, 0.45);
  }

  /* ── Table ────────────────────────────────────────────────────────── */
  table { width: 100%; border-collapse: collapse; font-size: 0.8rem; }

  th {
    color: rgba(255, 255, 255, 0.3);
    text-align: left;
    padding: 10px 12px;
    border-bottom: 1px solid rgba(168, 85, 247, 0.1);
    font-weight: 600;
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  td {
    padding: 10px 12px;
    border-bottom: 1px solid rgba(255, 255, 255, 0.03);
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.78rem;
    transition: background 0.2s;
  }

  tr:hover td {
    background: rgba(168, 85, 247, 0.04);
  }

  .badge {
    padding: 4px 10px;
    border-radius: 20px;
    font-size: 0.68rem;
    font-weight: 700;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }

  .badge.c {
    background: rgba(239, 68, 68, 0.15);
    color: #f87171;
    border: 1px solid rgba(239, 68, 68, 0.2);
  }

  .badge.l {
    background: rgba(34, 197, 94, 0.15);
    color: #4ade80;
    border: 1px solid rgba(34, 197, 94, 0.2);
  }

  /* ── Charts & Layout Utilities ────────────────────────────────────── */
  canvas { max-height: 220px; }
  .full { grid-column: 1 / -1; }

  /* ── Responsive ───────────────────────────────────────────────────── */
  @media (max-width: 900px) {
    .grid { grid-template-columns: 1fr; }
    .stats-row { grid-template-columns: repeat(2, 1fr); }
    .sliders { grid-template-columns: 1fr; }
    header { padding: 16px 20px; }
    .grid { padding: 16px; }
    .stats-row { padding: 0 16px; }
  }
</style>
</head>
<body>

<header>
  <div>
    <h1>🛡️ CheatShield AI</h1>
    <span>Real-time Game Behavior Analysis · ML Ensemble · 5 Models</span>
  </div>
</header>

<!-- Stats -->
<div class="stats-row" id="statsRow">
  <div class="stat"><div class="val" id="s-total">—</div><div class="lbl">Total Scanned</div></div>
  <div class="stat"><div class="val" id="s-cheaters" style="color:#f87171">—</div><div class="lbl">Cheaters Found</div></div>
  <div class="stat"><div class="val" id="s-legit" style="color:#4ade80">—</div><div class="lbl">Legit Players</div></div>
  <div class="stat"><div class="val" id="s-rate">—</div><div class="lbl">Cheat Rate %</div></div>
</div>

<div class="grid">

  <!-- Input Panel -->
  <div class="card">
    <h2>🎮 Player Session Input</h2>
    <div class="sliders" id="sliders"></div>
    <button id="predictBtn" onclick="predict()">⚡ Analyze Player</button>
    <div class="result-box" id="resultBox"></div>
  </div>

  <!-- Scatter PCA -->
  <div class="card">
    <h2>🔵 PCA Player Space</h2>
    <canvas id="pcaChart"></canvas>
  </div>

  <!-- Confidence Bar -->
  <div class="card">
    <h2>📊 Detection Confidence History</h2>
    <canvas id="confChart"></canvas>
  </div>

  <!-- History Table -->
  <div class="card">
    <h2>📋 Recent Sessions</h2>
    <table>
      <thead><tr><th>Time</th><th>Result</th><th>Confidence</th><th>Archetype</th></tr></thead>
      <tbody id="histBody"></tbody>
    </table>
  </div>

</div>

<script>
const FEATURES = {
  avg_reaction_ms:  { label:"Avg Reaction (ms)",    min:30,  max:500, step:1,    def:220 },
  reaction_std:     { label:"Reaction StdDev",       min:1,   max:100, step:1,    def:45  },
  click_accuracy:   { label:"Click Accuracy",        min:0,   max:1,   step:0.01, def:0.72},
  actions_per_min:  { label:"Actions/Min",           min:50,  max:700, step:1,    def:180 },
  mouse_speed_avg:  { label:"Mouse Speed (px/s)",    min:100, max:2000,step:10,   def:500 },
  mouse_speed_std:  { label:"Mouse Speed StdDev",    min:5,   max:400, step:1,    def:200 },
  snap_events:      { label:"Snap Events",           min:0,   max:80,  step:1,    def:2   },
  win_rate:         { label:"Win Rate",              min:0,   max:1,   step:0.01, def:0.45},
  kill_death_ratio: { label:"K/D Ratio",             min:0.1, max:15,  step:0.1,  def:1.1 },
  headshot_ratio:   { label:"Headshot Ratio",        min:0,   max:1,   step:0.01, def:0.35},
  session_hours:    { label:"Session Hours",         min:0.5, max:12,  step:0.5,  def:2.5 },
  movement_entropy: { label:"Movement Entropy",      min:0,   max:1,   step:0.01, def:0.78},
};

// Build sliders
const sliderDiv = document.getElementById("sliders");
for (const [key, cfg] of Object.entries(FEATURES)) {
  sliderDiv.innerHTML += `
    <div>
      <label>${cfg.label} <span class="val-display" id="v_${key}">${cfg.def}</span></label>
      <input type="range" id="${key}" min="${cfg.min}" max="${cfg.max}" step="${cfg.step}" value="${cfg.def}"
        oninput="document.getElementById('v_${key}').textContent=parseFloat(this.value).toFixed(this.step<1?2:0)"/>
    </div>`;
}

// Charts
const pcaCtx   = document.getElementById("pcaChart").getContext("2d");
const confCtx  = document.getElementById("confChart").getContext("2d");

Chart.defaults.color = '#666';

const pcaChart = new Chart(pcaCtx, {
  type:"scatter",
  data:{ datasets:[
    { label:"Legit",   data:[], backgroundColor:"rgba(74,222,128,0.6)", pointRadius:5 },
    { label:"Cheater", data:[], backgroundColor:"rgba(248,113,113,0.6)", pointRadius:5 },
    { label:"You",     data:[], backgroundColor:"#facc15", pointRadius:10, pointStyle:"star" }
  ]},
  options:{ plugins:{ legend:{ labels:{ color:"#aaa", font: { family: "'Inter'" } }}},
    scales:{ x:{ticks:{color:"#444"}, grid:{color:"rgba(168,85,247,0.06)"}},
             y:{ticks:{color:"#444"}, grid:{color:"rgba(168,85,247,0.06)"}} }}
});

const confChart = new Chart(confCtx, {
  type:"bar",
  data:{ labels:[], datasets:[{ label:"Confidence %", data:[], backgroundColor:[], borderRadius: 6 }]},
  options:{ plugins:{ legend:{ labels:{ color:"#aaa", font: { family: "'Inter'" } }}},
    scales:{ x:{ticks:{color:"#444"}, grid:{color:"rgba(168,85,247,0.06)"}},
             y:{ticks:{color:"#444"}, grid:{color:"rgba(168,85,247,0.06)"}, max:100 } }}
});

async function predict() {
  const body = {};
  for (const key of Object.keys(FEATURES))
    body[key] = parseFloat(document.getElementById(key).value);

  const res  = await fetch("http://localhost:5000/predict", {
    method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify(body)
  });
  const data = await res.json();

  const box = document.getElementById("resultBox");
  box.style.display = "block";
  box.className = "result-box " + (data.label ? "cheat" : "legit");
  box.innerHTML = `${data.prediction}<div class="result-meta">
    Confidence: ${data.confidence}% · ${data.archetype}<br/>Risk Score: ${data.risk_score}/100
  </div>`;

  // Update PCA chart
  const ds = data.label === 1 ? pcaChart.data.datasets[1] : pcaChart.data.datasets[0];
  ds.data.push({ x: data.pca[0], y: data.pca[1] });
  pcaChart.data.datasets[2].data = [{ x: data.pca[0], y: data.pca[1] }];
  pcaChart.update();

  // Update confidence chart
  const label = new Date().toLocaleTimeString();
  confChart.data.labels.push(label);
  confChart.data.datasets[0].data.push(data.confidence);
  confChart.data.datasets[0].backgroundColor.push(data.label ? "#f87171" : "#4ade80");
  if (confChart.data.labels.length > 12) {
    confChart.data.labels.shift();
    confChart.data.datasets[0].data.shift();
    confChart.data.datasets[0].backgroundColor.shift();
  }
  confChart.update();

  loadHistory(); loadStats();
}

async function loadHistory() {
  const data = await fetch("http://localhost:5000/history").then(r=>r.json());
  const tbody = document.getElementById("histBody");
  tbody.innerHTML = data.map(r => `<tr>
    <td>${r.timestamp?.slice(11,19) || "—"}</td>
    <td><span class="badge ${r.prediction ? 'c':'l'}">${r.prediction ? "CHEAT":"LEGIT"}</span></td>
    <td>${r.confidence}%</td>
    <td>${r.archetype}</td>
  </tr>`).join("");
}

async function loadStats() {
  const s = await fetch("http://localhost:5000/stats").then(r=>r.json());
  document.getElementById("s-total").textContent    = s.total;
  document.getElementById("s-cheaters").textContent = s.cheaters;
  document.getElementById("s-legit").textContent    = s.legit;
  document.getElementById("s-rate").textContent     = s.cheat_rate + "%";
}

loadStats(); loadHistory();
setInterval(() => { loadStats(); loadHistory(); }, 5000);
</script>
</body>
</html>
